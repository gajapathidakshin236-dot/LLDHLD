# =====================================================================
# application.properties = the app's settings file.
# Spring Boot reads this at startup. Everything not listed here falls
# back to a sensible default (e.g. server.port defaults to 8080).
# =====================================================================

spring.application.name=api-server

# --- Web server ------------------------------------------------------
# Default port is 8080. Uncomment to change if 8080 is busy on your PC.
#server.port=8081

# --- Database connection (H2, in-memory) -----------------------------
# jdbc:h2:mem:taskdb  =  "H2 engine, keep data in RAM, call the db 'taskdb'".
# In-memory means: created fresh at startup, gone when the app stops.
spring.datasource.url=jdbc:h2:mem:taskdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate -------------------------------------------------
# create-drop: at startup Hibernate reads the @Entity classes and CREATEs
# the tables; at shutdown it drops them. Perfect for learning.
# (Real projects use 'validate' or migration tools like Flyway instead.)
spring.jpa.hibernate.ddl-auto=create-drop

# Print every SQL statement Hibernate runs into the console - great for
# SEEING what your Java calls turn into.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Run data.sql only AFTER Hibernate has created the tables.
# (Otherwise the INSERTs would fire before the table exists and fail.)
spring.jpa.defer-datasource-init=true
spring.sql.init.mode=embedded

# --- H2 web console --------------------------------------------------
# A small database GUI served by the app itself.
# Open http://localhost:8080/h2-console in your browser.
#   JDBC URL:  jdbc:h2:mem:taskdb   (must match the url above!)
#   User:      sa        Password:  (leave empty)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Rate limiting (YOUR LLD, wired in) ------------------------------
# Read by RateLimitConfig, which builds your TokenBucketStrategy
# (com.company.ratelimite) and applies it to every /api/* request via
# RateLimitFilter. Empty bucket -> HTTP 429 Too Many Requests.
# Burst capacity 5 tokens, refilling 1 token per second:
ratelimit.capacity=5
ratelimit.refill-per-second=1
