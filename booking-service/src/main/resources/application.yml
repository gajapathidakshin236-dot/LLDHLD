# ===========================================================================
# application.yml  -  runtime configuration
# ---------------------------------------------------------------------------
# Everything here is documented inline so you can talk through it in an
# interview. The property that stops OOMs is pageable.max-page-size - read it
# and the pagination cheatsheet before you touch anything else.
# ===========================================================================

spring:
  application:
    name: booking-service

  # ----- H2 in-memory DB (zero setup, wipes on restart) --------------------
  datasource:
    url: jdbc:h2:mem:bookings;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 web console at http://localhost:8080/h2-console  (JDBC URL above)
  h2:
    console:
      enabled: true
      path: /h2-console

  # ----- Hibernate / JPA ----------------------------------------------------
  jpa:
    hibernate:
      # 'none' -> we own schema via schema.sql. Never use 'update' or 'create'
      # in a real service; migrations belong in Flyway/Liquibase.
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        # jdbc.batch_size + order_inserts turns N INSERTs into 1 round-trip
        jdbc.batch_size: 25
        order_inserts: true
    show-sql: true
    open-in-view: false   # OSIV=false: sessions end at the transaction, not the response

  # ----- schema.sql + data.sql on startup -----------------------------------
  sql:
    init:
      mode: always
      platform: h2

  # ----- Pagination: THE line that matters ----------------------------------
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100          # <-- without this, ?size=999999999 is an OOM
        one-indexed-parameters: false
        page-parameter: page
        size-parameter: size
      sort:
        sort-parameter: sort

  # ----- Cache (Caffeine) ---------------------------------------------------
  cache:
    type: caffeine
    cache-names: shows              # name matches @Cacheable("shows")
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=5m

  # ----- Jackson ------------------------------------------------------------
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# ---------------------------------------------------------------------------
# Actuator - health check for load balancers
# ---------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,caches,metrics
  endpoint:
    health:
      show-details: when_authorized

# ---------------------------------------------------------------------------
# Logging - keep repository SQL loud in dev, quieter in prod
# ---------------------------------------------------------------------------
logging:
  # %X{cid} prints the correlation id that CorrelationIdFilter put into the MDC.
  # Grep one cid and you see every log line of that single request - across
  # filter, interceptor, controller, service, aspect, and async listener.
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] [cid=%X{cid:-}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.company.booking: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
